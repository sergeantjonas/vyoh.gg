services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vyoh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vyoh}
      POSTGRES_DB: ${POSTGRES_DB:-vyoh}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vyoh} -d ${POSTGRES_DB:-vyoh}"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  postgres-data:
