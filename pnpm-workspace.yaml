packages:
  - "apps/*"
  - "packages/*"
  - "tools/*"
overrides:
  protobufjs@<7.5.6: ^7.5.6
  brace-expansion@>=5.0.0 <5.0.6: ^5.0.6
  ws@>=8.0.0 <8.20.1: ^8.20.1
  # file-type@16 (CJS) is pinned by @jimp/core in tools/champion-assets; v21 is
  # ESM-only and breaks require(). Build-time script on controlled inputs — risk accepted.
  file-type@>=17.0.0 <21.3.2: ^21.3.2
  "@hono/node-server@<1.19.13": ^1.19.13
allowBuilds:
  '@biomejs/biome': true
  '@nestjs/core': true
  '@prisma/engines': true
  '@swc/core': true
  esbuild: true
  msw: true
  prisma: true
  protobufjs: true
  sharp: true
