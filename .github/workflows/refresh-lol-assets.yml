name: Refresh LoL assets

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-lol-assets
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh bundled LoL assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - name: Restore Sharp cache
        uses: actions/cache@v4
        with:
          path: .cache/lol-images
          key: lol-images-${{ hashFiles('apps/web/public/lol/manifest.json') }}
          restore-keys: |
            lol-images-

      - name: Refresh assets
        id: refresh
        run: pnpm refresh:lol-assets

      - name: Skip PR when nothing changed
        id: gate
        run: |
          if [ "${{ steps.refresh.outputs.no-changes }}" = "true" ]; then
            echo "open-pr=false" >> "$GITHUB_OUTPUT"
          else
            echo "open-pr=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute PR labels
        id: labels
        if: steps.gate.outputs.open-pr == 'true'
        run: |
          if [ "${{ steps.refresh.outputs.additive }}" = "true" ]; then
            printf 'labels<<EOF\nautomated:asset-refresh\nautomerge\nEOF\n' >> "$GITHUB_OUTPUT"
          else
            printf 'labels<<EOF\nautomated:asset-refresh\nEOF\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Open refresh PR
        if: steps.gate.outputs.open-pr == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automated/lol-asset-refresh
          commit-message: 'chore: refresh lol assets (patch ${{ steps.refresh.outputs.patch }})'
          title: 'chore: refresh lol assets (patch ${{ steps.refresh.outputs.patch }})'
          labels: ${{ steps.labels.outputs.labels }}
          body: |
            Automated refresh from `refresh-lol-assets.yml`.

            ${{ steps.refresh.outputs.summary }}

            ---
            <sub>Additive-only diff: `${{ steps.refresh.outputs.additive }}` · Runtime long-tail fallback covers any still-missing entries.</sub>
