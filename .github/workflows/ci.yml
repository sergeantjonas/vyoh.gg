name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, format, typecheck, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm ci:check

      - run: pnpm typecheck

      - name: Test with coverage
        run: pnpm -r test --coverage 2>&1 | tee coverage-output.log

      - name: Append coverage summary to step summary
        if: always()
        run: |
          {
            echo "## Coverage summary"
            echo
            echo '```'
            grep -E "Coverage summary|Statements|Branches|Functions|Lines|test:  %" coverage-output.log || tail -30 coverage-output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/api/coverage/lcov.info,./apps/web/coverage/lcov.info,./packages/shared/coverage/lcov.info
          flags: api,web,shared
          fail_ci_if_error: false

  audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - run: corepack enable

      - run: pnpm audit --prod --audit-level=high

  bundle-size:
    name: Bundle size budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @vyoh/web build

      - run: pnpm --filter @vyoh/web size
